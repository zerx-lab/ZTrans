<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="zg" x1="168" y1="130" x2="358" y2="358" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- "A" — source language (upper-left) -->
  <text x="112" y="180"
        font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="96"
        fill="#ffffff" opacity="0.9" text-anchor="middle">A</text>

  <!-- Z path — connects A → 文, clean stroked shape -->
  <path d="M 172 138 L 362 138 L 152 356 L 342 356"
        fill="none" stroke="url(#zg)" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "文" — target language (lower-right) -->
  <text x="402" y="410"
        font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-weight="800" font-size="86"
        fill="#ffffff" opacity="0.9" text-anchor="middle">文</text>

</svg>
